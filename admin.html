<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — HINEMOS Shift</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f0d;
    --surface: #1a1a16;
    --surface2: #242420;
    --border: #2e2e28;
    --accent: #c8a96e;
    --accent2: #8fb89a;
    --text: #e8e6df;
    --muted: #7a7870;
    --danger: #c0664a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; color: var(--accent); }
  .header-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .stat-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-num { font-size: 26px; font-weight: 600; color: var(--accent); margin-top: 4px; }

  /* Tab bar */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab {
    padding: 10px 18px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Grid view */
  .grid-table { width: 100%; border-collapse: collapse; font-size: 12px; }

  .grid-table th {
    padding: 8px 10px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .grid-table th.name-col { text-align: left; min-width: 140px; }

  .grid-table td {
    padding: 8px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .grid-table td:last-child { border-right: none; }
  .grid-table td.name-cell {
    text-align: left;
    padding: 8px 10px;
    font-size: 13px;
    white-space: nowrap;
    position: sticky;
    left: 0;
    background: var(--surface);
  }

  .cell-full {
    background: #1e3a26;
    color: var(--accent2);
    border-radius: 4px;
    padding: 4px 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    display: inline-block;
    white-space: nowrap;
  }

  .cell-partial {
    background: #2e2a1a;
    color: var(--accent);
    border-radius: 4px;
    padding: 4px 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    display: inline-block;
    white-space: nowrap;
  }

  .cell-off {
    color: var(--border);
    font-size: 14px;
  }

  .cell-none {
    color: var(--border);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
  }

  /* Event cards */
  .event-admin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .event-admin-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .date-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    text-align: center;
    min-width: 48px;
  }

  .date-day { font-size: 18px; font-weight: 600; color: var(--accent); line-height: 1; }
  .date-month { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; }

  .event-admin-info { flex: 1; }
  .event-dow { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .event-time-need { font-size: 13px; margin-top: 2px; }

  .need-badge {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid;
  }

  .need-ok { border-color: var(--accent2); color: var(--accent2); background: #1e3a26; }
  .need-warn { border-color: var(--accent); color: var(--accent); background: #2e2a1a; }
  .need-danger { border-color: var(--danger); color: var(--danger); background: #2e1a1a; }

  .staff-chips { padding: 12px 18px; display: flex; flex-wrap: wrap; gap: 8px; }

  .chip {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .chip-full { border-color: var(--accent2); color: var(--accent2); background: #1a2e20; }
  .chip-partial { border-color: var(--accent); color: var(--accent); background: #2a2418; }
  .chip-time { font-size: 10px; font-family: 'DM Mono', monospace; opacity: 0.8; }

  .no-response { font-size: 12px; color: var(--muted); padding: 12px 18px; font-style: italic; }

  /* Buttons */
  .btn {
    padding: 10px 20px;
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    transition: all 0.2s;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-accent { background: var(--accent); color: #0f0f0d; border-color: var(--accent); }
  .btn-accent:hover { opacity: 0.88; color: #0f0f0d; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">HINEMOS — Admin</div>
    <div class="header-sub">June 2026 · Shift Overview</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn" onclick="clearData()" style="font-size:12px;padding:8px 14px;">Clear Data</button>
    <button class="btn btn-accent" onclick="exportCSV()">Export CSV</button>
  </div>
</header>

<div class="container">

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-label">Responses</div><div class="stat-num" id="stat-responses">0</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-num" id="stat-pending">0</div></div>
    <div class="stat-card"><div class="stat-label">Dates Covered</div><div class="stat-num" id="stat-covered">0</div></div>
    <div class="stat-card"><div class="stat-label">Dates Short</div><div class="stat-num" id="stat-short" style="color:var(--danger)">–</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('by-date', this)">By Date</div>
    <div class="tab" onclick="switchTab('grid', this)">Grid View</div>
  </div>

  <!-- BY DATE -->
  <div class="tab-content active" id="tab-by-date">
    <div id="by-date-content"></div>
  </div>

  <!-- GRID -->
  <div class="tab-content" id="tab-grid">
    <div class="table-wrap">
      <table class="grid-table" id="grid-table">
        <thead><tr id="grid-head"></tr></thead>
        <tbody id="grid-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const STAFF = [
  "Wee Meili","Enya Wu Zi Qian","Lim Yen Peow","Yap Han Nee Ariel",
  "Hideyuki Kawamura","Yuta Sakai","Wong Tsu-Yi"
];

const EVENTS = [
  { date: "2026-06-05", dow: "Friday",    need: 2 },
  { date: "2026-06-06", dow: "Saturday",  need: 4 },
  { date: "2026-06-07", dow: "Sunday",    need: 3 },
  { date: "2026-06-08", dow: "Monday",    need: 2 },
  { date: "2026-06-09", dow: "Tuesday",   need: 2 },
  { date: "2026-06-10", dow: "Wednesday", need: 2 },
  { date: "2026-06-11", dow: "Thursday",  need: 2 },
  { date: "2026-06-12", dow: "Friday",    need: 2 },
  { date: "2026-06-13", dow: "Saturday",  need: 4 },
  { date: "2026-06-14", dow: "Sunday",    need: 3 },
  { date: "2026-06-15", dow: "Monday",    need: 2 },
  { date: "2026-06-16", dow: "Tuesday",   need: 2 },
  { date: "2026-06-17", dow: "Wednesday", need: 2 },
  { date: "2026-06-18", dow: "Thursday",  need: 2 },
];

function loadData() {
  try { return JSON.parse(localStorage.getItem('hinemos_responses') || '{}'); } catch { return {}; }
}

function getResponse(data, name, date) {
  if (!data[name]) return null;
  return data[name].responses.find(r => r.date === date) || null;
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

function render() {
  const data = loadData();
  const responders = Object.keys(data);
  const pending = STAFF.filter(s => !data[s]).length;

  // Stats
  document.getElementById('stat-responses').textContent = responders.length;
  document.getElementById('stat-pending').textContent = pending;

  let covered = 0, short = 0;
  EVENTS.forEach(ev => {
    const avail = STAFF.filter(s => {
      const r = getResponse(data, s, ev.date);
      return r && (r.type === 'full' || r.type === 'partial');
    }).length;
    if (avail >= ev.need) covered++;
    else if (responders.length === STAFF.length) short++;
  });
  document.getElementById('stat-covered').textContent = covered;
  document.getElementById('stat-short').textContent = responders.length === STAFF.length ? short : '–';

  renderByDate(data);
  renderGrid(data);
}

function renderByDate(data) {
  const cont = document.getElementById('by-date-content');
  if (Object.keys(data).length === 0) {
    cont.innerHTML = `<div class="empty-state"><div class="big">📋</div>No responses yet.<br>Share the staff link to collect availability.</div>`;
    return;
  }
  cont.innerHTML = EVENTS.map(ev => {
    const d = new Date(ev.date);
    const day = d.getDate();
    const month = d.toLocaleString('en', { month: 'short' }).toUpperCase();
    const available = STAFF.filter(s => {
      const r = getResponse(data, s, ev.date);
      return r && (r.type === 'full' || r.type === 'partial');
    });
    const count = available.length;
    const badgeClass = count >= ev.need ? 'need-ok' : count >= ev.need * 0.6 ? 'need-warn' : 'need-danger';
    const chips = STAFF.map(s => {
      const r = getResponse(data, s, ev.date);
      if (!r || r.type === 'off' || !r.type) return '';
      const cls = r.type === 'full' ? 'chip-full' : 'chip-partial';
      const timeStr = r.type === 'partial' ? `<span class="chip-time">${r.start}–${r.end}</span>` : `<span class="chip-time">Full</span>`;
      return `<div class="chip ${cls}">${s.split(' ')[0]} ${timeStr}</div>`;
    }).filter(Boolean).join('');

    return `
    <div class="event-admin-card">
      <div class="event-admin-header">
        <div class="date-badge"><div class="date-day">${day}</div><div class="date-month">${month}</div></div>
        <div class="event-admin-info">
          <div class="event-dow">${ev.dow}</div>
          <div class="event-time-need">10:00–21:00 · ${ev.need} needed</div>
        </div>
        <div class="need-badge ${badgeClass}">${count} / ${ev.need}</div>
      </div>
      ${chips ? `<div class="staff-chips">${chips}</div>` : '<div class="no-response">No responses yet</div>'}
    </div>`;
  }).join('');
}

function renderGrid(data) {
  const head = document.getElementById('grid-head');
  const body = document.getElementById('grid-body');

  head.innerHTML = `<th class="name-col">Name</th>` +
    EVENTS.map(ev => {
      const d = new Date(ev.date);
      return `<th>${d.getDate()}/${d.getMonth()+1}<br><span style="color:var(--border)">${ev.dow.slice(0,2)}</span></th>`;
    }).join('');

  body.innerHTML = STAFF.map(name => {
    const responded = !!data[name];
    const cells = EVENTS.map(ev => {
      if (!responded) return `<td><span class="cell-none">–</span></td>`;
      const r = getResponse(data, name, ev.date);
      if (!r || r.type === 'off' || !r.type) return `<td><span class="cell-off">✗</span></td>`;
      if (r.type === 'full') return `<td><span class="cell-full">Full</span></td>`;
      return `<td><span class="cell-partial">${r.start}<br>${r.end}</span></td>`;
    }).join('');

    return `<tr>
      <td class="name-cell">${name}${!responded ? ' <span style="color:var(--muted);font-size:10px;">(pending)</span>' : ''}</td>
      ${cells}
    </tr>`;
  }).join('');
}

function exportCSV() {
  const data = loadData();
  const rows = [['Name', ...EVENTS.map(e => e.date)]];
  STAFF.forEach(name => {
    const row = [name, ...EVENTS.map(ev => {
      const r = getResponse(data, name, ev.date);
      if (!r || r.type === 'off' || !r.type) return 'Off';
      if (r.type === 'full') return '10:00-21:00';
      return `${r.start}-${r.end}`;
    })];
    rows.push(row);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hinemos_shift_june2026.csv';
  a.click();
}

function clearData() {
  if (confirm('Clear all response data?')) {
    localStorage.removeItem('hinemos_responses');
    render();
  }
}

render();
setInterval(render, 5000); // Auto-refresh every 5s
</script>
</body>
</html>
