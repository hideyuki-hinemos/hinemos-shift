<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — HINEMOS Shift</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg: #0f0f0d; --surface: #1a1a16; --surface2: #242420;
    --border: #2e2e28; --accent: #c8a96e; --accent2: #8fb89a;
    --text: #e8e6df; --muted: #7a7870; --danger: #c0664a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 80px; }
  header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.15em; color: var(--accent); }
  .header-sub { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .container { max-width: 760px; margin: 0 auto; padding: 32px 20px; }
  .section-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 16px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .field input, .field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .staff-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .staff-check { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 14px; cursor: pointer; transition: border-color 0.2s; }
  .staff-check:hover { border-color: var(--accent); }
  .staff-check.checked { border-color: var(--accent); }
  .staff-check input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .staff-check span { font-size: 13px; }
  .date-row { display: grid; grid-template-columns: 1fr 120px 120px 80px auto; gap: 8px; align-items: center; margin-bottom: 8px; }
  .date-row input { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; width: 100%; }
  .date-row input:focus { border-color: var(--accent); }
  .remove-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 8px 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
  .remove-btn:hover { border-color: var(--danger); color: var(--danger); }
  .add-date-btn { background: none; border: 1px dashed var(--border); border-radius: 7px; color: var(--muted); padding: 10px; font-size: 13px; font-family: 'DM Mono', monospace; cursor: pointer; width: 100%; margin-top: 4px; transition: all 0.2s; }
  .add-date-btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 13px 28px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #0f0f0d; width: 100%; margin-top: 8px; }
  .btn-primary:hover { opacity: 0.9; }
  .url-box { background: var(--surface2); border: 1px solid var(--accent); border-radius: 10px; padding: 20px; margin-top: 20px; display: none; }
  .url-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 8px; }
  .url-text { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); word-break: break-all; line-height: 1.6; }
  .copy-btn { margin-top: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 8px 16px; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 18px; font-size: 13px; font-family: 'DM Mono', monospace; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  /* Responses view */
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.1em; }
  .stat-num { font-size: 26px; font-weight: 600; color: var(--accent); margin-top: 4px; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  .grid-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .grid-table th { padding: 8px 10px; text-align: center; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  .grid-table th.name-col { text-align: left; min-width: 140px; }
  .grid-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
  .grid-table td:last-child { border-right: none; }
  .grid-table td.name-cell { text-align: left; padding: 8px 10px; font-size: 13px; white-space: nowrap; background: var(--surface); }
  .cell-full { background: #1e3a26; color: var(--accent2); border-radius: 4px; padding: 3px 6px; font-family: 'DM Mono', monospace; font-size: 10px; display: inline-block; white-space: nowrap; }
  .cell-partial { background: #2e2a1a; color: var(--accent); border-radius: 4px; padding: 3px 6px; font-family: 'DM Mono', monospace; font-size: 10px; display: inline-block; white-space: nowrap; }
  .cell-off { color: var(--border); font-size: 14px; }
  .cell-none { color: var(--border); font-size: 11px; font-family: 'DM Mono', monospace; }
  .event-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .event-pill { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; color: var(--muted); transition: all 0.2s; }
  .event-pill.active { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
  .export-btn { background: var(--accent); color: #0f0f0d; border: none; border-radius: 7px; padding: 8px 16px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; }
  .notice { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; padding: 12px 16px; font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .date-row-header { display: grid; grid-template-columns: 1fr 120px 120px 80px auto; gap: 8px; margin-bottom: 6px; }
  .date-row-header span { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; padding: 0 12px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">HINEMOS — Admin</div>
    <div class="header-sub">Shift Management</div>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('setup',this)">Event Setup</div>
    <div class="tab" onclick="switchTab('responses',this)">Responses</div>
  </div>

  <!-- SETUP TAB -->
  <div class="tab-content active" id="tab-setup">

    <div class="section-title">New Event</div>

    <div class="card">
      <div class="field">
        <label>EVENT NAME (used as sheet tab name)</label>
        <input type="text" id="event-name" placeholder="e.g. 26.06 Jewel Changi" />
      </div>
    </div>

    <div class="section-title" style="margin-top:20px;">Staff</div>
    <div class="card">
      <div class="staff-checks" id="staff-checks"></div>
    </div>

    <div class="section-title" style="margin-top:20px;">Dates & Times</div>
    <div class="card">
      <div class="date-row-header">
        <span>Date</span><span>Start</span><span>End</span><span>Need</span><span></span>
      </div>
      <div id="dates-list"></div>
      <button class="add-date-btn" onclick="addDate()">+ Add date</button>
    </div>

    <button class="btn btn-primary" onclick="generateURL()">Generate Staff URL →</button>

    <div class="url-box" id="url-box">
      <div class="url-label">STAFF URL — Share this link</div>
      <div class="url-text" id="generated-url"></div>
      <button class="copy-btn" onclick="copyURL()">Copy URL</button>
    </div>

  </div>

  <!-- RESPONSES TAB -->
  <div class="tab-content" id="tab-responses">

    <div class="notice">Responses are stored in Google Sheets. Select an event below to view local responses collected in this browser.</div>

    <div class="section-title">Saved Events</div>
    <div class="event-selector" id="event-selector"></div>

    <div id="responses-content">
      <div style="text-align:center;padding:40px;color:var(--muted);font-size:14px;">Select an event above to view responses.</div>
    </div>

  </div>
</div>

<script>
const STAFF_LIST = [
  "Wee Meili","Enya Wu Zi Qian","Lim Yen Peow","Yap Han Nee Ariel",
  "Hideyuki Kawamura","Yuta Sakai","Wong Tsu-Yi"
];

const GAS_URL = "https://script.google.com/macros/s/AKfycbzEGTmYlkFd6TQ-X2DBAUAU4yQjsrHBuqCLudpkCIIO9gHsWH8RroVrHovmUkbs3TOb/exec";

// Init staff checkboxes
const staffChecks = document.getElementById('staff-checks');
STAFF_LIST.forEach(name => {
  const div = document.createElement('div');
  div.className = 'staff-check checked';
  div.innerHTML = `<input type="checkbox" checked id="chk-${name}"><span>${name}</span>`;
  div.onclick = () => {
    const chk = div.querySelector('input');
    chk.checked = !chk.checked;
    div.classList.toggle('checked', chk.checked);
  };
  div.querySelector('input').onclick = e => e.stopPropagation();
  staffChecks.appendChild(div);
});

// Date rows
let dateCount = 0;
function addDate(date='', start='10:00', end='21:00', need=2) {
  dateCount++;
  const id = dateCount;
  const row = document.createElement('div');
  row.className = 'date-row';
  row.id = `date-row-${id}`;
  row.innerHTML = `
    <input type="date" value="${date}" id="date-${id}">
    <input type="time" value="${start}" id="start-${id}">
    <input type="time" value="${end}" id="end-${id}">
    <input type="number" value="${need}" min="1" max="20" id="need-${id}" style="text-align:center;">
    <button class="remove-btn" onclick="removeDate(${id})">✕</button>
  `;
  document.getElementById('dates-list').appendChild(row);
}

function removeDate(id) {
  const row = document.getElementById(`date-row-${id}`);
  if (row) row.remove();
}

// Add default dates
const defaultDates = [
  ["2026-06-05","10:00","21:00",2],["2026-06-06","10:00","21:00",4],
  ["2026-06-07","10:00","21:00",3],["2026-06-08","10:00","21:00",2],
  ["2026-06-09","10:00","21:00",2],["2026-06-10","10:00","21:00",2],
  ["2026-06-11","10:00","21:00",2],["2026-06-12","10:00","21:00",2],
  ["2026-06-13","10:00","21:00",4],["2026-06-14","10:00","21:00",3],
  ["2026-06-15","10:00","21:00",2],["2026-06-16","10:00","21:00",2],
  ["2026-06-17","10:00","21:00",2],["2026-06-18","10:00","21:00",2],
];
defaultDates.forEach(d => addDate(...d));

function getEventConfig() {
  const name = document.getElementById('event-name').value.trim();
  const staff = STAFF_LIST.filter(s => document.getElementById(`chk-${s}`)?.checked);
  const rows = document.querySelectorAll('.date-row');
  const dates = [];
  rows.forEach(row => {
    const id = row.id.replace('date-row-','');
    const date = document.getElementById(`date-${id}`)?.value;
    const start = document.getElementById(`start-${id}`)?.value;
    const end = document.getElementById(`end-${id}`)?.value;
    const need = document.getElementById(`need-${id}`)?.value;
    if (date) dates.push({ date, start, end, need: parseInt(need)||2 });
  });
  return { name, staff, dates };
}

function generateURL() {
  const config = getEventConfig();
  if (!config.name) { alert('Please enter an event name.'); return; }
  if (!config.dates.length) { alert('Please add at least one date.'); return; }
  if (!config.staff.length) { alert('Please select at least one staff.'); return; }

  // Save config locally
  const saved = JSON.parse(localStorage.getItem('hinemos_events') || '{}');
  saved[config.name] = config;
  localStorage.setItem('hinemos_events', JSON.stringify(saved));

  const encoded = encodeURIComponent(JSON.stringify(config));
  const baseURL = window.location.href.replace('admin.html','index.html');
  const url = `${baseURL}?event=${encoded}`;

  document.getElementById('generated-url').textContent = url;
  document.getElementById('url-box').style.display = 'block';
  document.getElementById('url-box').scrollIntoView({ behavior: 'smooth' });
}

function copyURL() {
  const url = document.getElementById('generated-url').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy URL', 2000);
  });
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if (id === 'responses') renderEventSelector();
}

function renderEventSelector() {
  const saved = JSON.parse(localStorage.getItem('hinemos_events') || '{}');
  const sel = document.getElementById('event-selector');
  sel.innerHTML = '';
  if (!Object.keys(saved).length) {
    sel.innerHTML = '<div style="color:var(--muted);font-size:13px;">No events created yet.</div>';
    return;
  }
  Object.keys(saved).forEach(name => {
    const pill = document.createElement('div');
    pill.className = 'event-pill';
    pill.textContent = name;
    pill.onclick = () => {
      document.querySelectorAll('.event-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      renderResponses(name, saved[name]);
    };
    sel.appendChild(pill);
  });
}

function renderResponses(eventName, config) {
  const allResponses = JSON.parse(localStorage.getItem('hinemos_responses') || '{}');
  const responses = allResponses[eventName] || {};
  const cont = document.getElementById('responses-content');

  const responders = Object.keys(responses);
  const pending = config.staff.filter(s => !responses[s]).length;

  let covered = 0;
  config.dates.forEach(ev => {
    const avail = config.staff.filter(s => {
      const r = responses[s]?.responses?.find(x => x.date === ev.date);
      return r && (r.type === 'full' || r.type === 'partial');
    }).length;
    if (avail >= ev.need) covered++;
  });

  cont.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-size:16px;font-weight:500;">${eventName}</div>
      <button class="export-btn" onclick="exportCSV('${eventName}')">Export CSV</button>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Responses</div><div class="stat-num">${responders.length}</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-num">${pending}</div></div>
      <div class="stat-card"><div class="stat-label">Dates Covered</div><div class="stat-num">${covered}</div></div>
      <div class="stat-card"><div class="stat-label">Total Dates</div><div class="stat-num">${config.dates.length}</div></div>
    </div>
    <div class="table-wrap">
      <table class="grid-table">
        <thead><tr>
          <th class="name-col">Name</th>
          ${config.dates.map(d => `<th>${d.date.slice(5)}<br><span style="color:var(--border)">${getDow(d.date)}</span></th>`).join('')}
        </tr></thead>
        <tbody>
          ${config.staff.map(name => {
            const resp = responses[name];
            const cells = config.dates.map(d => {
              if (!resp) return `<td><span class="cell-none">–</span></td>`;
              const r = resp.responses?.find(x => x.date === d.date);
              if (!r || r.type === 'off' || !r.type) return `<td><span class="cell-off">✗</span></td>`;
              if (r.type === 'full') return `<td><span class="cell-full">Full</span></td>`;
              return `<td><span class="cell-partial">${r.start}<br>${r.end}</span></td>`;
            }).join('');
            return `<tr><td class="name-cell">${name}${!resp?' <span style="color:var(--muted);font-size:10px;">(pending)</span>':''}</td>${cells}</tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function getDow(dateStr) {
  return ['Su','Mo','Tu','We','Th','Fr','Sa'][new Date(dateStr).getDay()];
}

function exportCSV(eventName) {
  const allResponses = JSON.parse(localStorage.getItem('hinemos_responses') || '{}');
  const responses = allResponses[eventName] || {};
  const saved = JSON.parse(localStorage.getItem('hinemos_events') || '{}');
  const config = saved[eventName];
  if (!config) return;
  const rows = [['Name', ...config.dates.map(d => d.date)]];
  config.staff.forEach(name => {
    const resp = responses[name];
    const row = [name, ...config.dates.map(d => {
      const r = resp?.responses?.find(x => x.date === d.date);
      if (!r || r.type === 'off' || !r.type) return 'Off';
      if (r.type === 'full') return `${d.start}-${d.end}`;
      return `${r.start}-${r.end}`;
    })];
    rows.push(row);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `hinemos_shift_${eventName.replace(/\s/g,'_')}.csv`;
  a.click();
}
</script>
</body>
</html>
